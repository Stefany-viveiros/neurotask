<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>NeuroTask - Lista Inteligente</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="app">

    <header class="header">
      <h1>🧠 NeuroTask</h1>
      <p class="subtitle">Sua lista de tarefas com inteligência adaptativa</p>
    </header>

    <div class="main">

      <!-- TAREFAS -->
      <div class="tasks-section">

        <div class="input-area">
          <input 
            type="text" 
            id="taskInput" 
            placeholder="Digite sua tarefa..."
          >
          <button onclick="addTask()">Adicionar</button>
        </div>

        <ul id="taskList"></ul>

      </div>

      <!-- LATERAL -->
      <div class="side-section">

        <div class="insight">
          <div id="stats"></div>
          <h3>💡 Sugestão Inteligente</h3>
          <p id="suggestion">Comece adicionando tarefas...</p>
        </div>

        <div class="chat-container">
          <h3>🤖 Assistente IA</h3>
          <div id="chatBox" class="chat-box"></div>

          <div class="chat-input-area">
            <input id="chatInput" placeholder="Converse com a IA..." />
            <button onclick="sendMessage()">Enviar</button>
          </div>
        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
